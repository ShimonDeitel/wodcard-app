<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wodcard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#241008; color:#f2f4f6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:32px; box-sizing:border-box; }
  .wrap { max-width:560px; }
  h1 { font-size:2.4rem; margin-bottom:8px; color:#C23B22; }
  p { font-size:1.1rem; line-height:1.5; color:#c8ccd0; }
  .cta { display:inline-block; margin-top:24px; padding:12px 28px; background:#C23B22; color:#0a0a0a; border-radius:10px; text-decoration:none; font-weight:600; }
  footer { margin-top:48px; font-size:0.85rem; color:#8a8f95; }
  a { color:#C23B22; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #C23B2255 0%, #C23B2200 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Wodcard</h1>
  <p>Benchmark-WOD trend charts and PR history</p>
  <p>Free to start, with an optional Pro upgrade: Benchmark-WOD trend charts and PR history.</p>
  <a class="cta" href="https://apps.apple.com">Coming to the App Store</a>
  <footer>
    <p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
    <p>Contact: s0533495227@gmail.com</p>
  </footer>
</div>
</body>
</html>
