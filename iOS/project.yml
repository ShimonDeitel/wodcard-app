name: Wodcard
options:
  bundleIdPrefix: com.shimondeitel.wodcard
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Wodcard:
    type: application
    platform: iOS
    sources:
      - path: Wodcard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.wodcard
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Wodcard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WodcardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WodcardTests
      - path: Wodcard.storekit
    dependencies:
      - target: Wodcard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.wodcard.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WodcardUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WodcardUITests
    dependencies:
      - target: Wodcard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.wodcard.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Wodcard:
    build:
      targets:
        Wodcard: all
        WodcardTests: [test]
        WodcardUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Wodcard.storekit
    test:
      config: Debug
      storeKitConfiguration: Wodcard.storekit
      targets:
        - WodcardTests
        - WodcardUITests
    archive:
      config: Release
